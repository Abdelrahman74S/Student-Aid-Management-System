version: '3.8'

services:
  redis:
    image: redis:7.4-alpine
    container_name: student_aid_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-supersecretredispassword}
    restart: always

volumes:
  redis_data:
