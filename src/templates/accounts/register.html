{% extends "base.html" %}

{% block title %}إنشاء حساب جديد | جامعة طنطا{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto py-12 px-4 fade-in font-cairo">
    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100 flex flex-col md:flex-row">
        <div class="md:w-1/3 bg-primary-700 p-10 text-white flex flex-col justify-center items-center text-center">
            <div class="w-20 h-20 bg-white/10 rounded-3xl flex items-center justify-center text-white font-bold text-4xl mb-6 backdrop-blur-sm border border-white/20">ط</div>
            <h2 class="text-2xl font-bold mb-4 font-tajawal">أهلاً بك!</h2>
            <p class="text-primary-100 text-sm leading-relaxed">انضم لنظام المساعدات الطلابية الرسمي لكلية العلوم وابدأ في تقديم طلباتك إلكترونياً.</p>
        </div>

        <div class="md:w-2/3 p-8 md:p-12 text-right">
            <h1 class="text-2xl font-bold text-gray-900 mb-8 font-tajawal border-b pb-4 border-gray-50">إنشاء حساب طالب جديد</h1>
            
            <form method="POST" action="{% url 'accounts:register' %}" class="space-y-6">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-right">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2 mr-1">الاسم الرباعي الكامل</label>
                        <input type="text" name="full_name" required class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition-all">
                    </div>
                    
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-2 mr-1">الرقم القومي (14 رقم)</label>
                        <input type="text" name="national_id" maxlength="14" required class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition-all">
                    </div>

                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-2 mr-1">البريد الجامعي</label>
                        <input type="email" name="email" required placeholder="UG_... @science.tanta.edu.eg"
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition-all text-left shadow-sm" dir="ltr">
                    </div>

                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-2 mr-1">كلمة المرور</label>
                        <input type="password" name="password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition-all text-left shadow-sm" dir="ltr">
                    </div>

                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-2 mr-1">تأكيد كلمة المرور</label>
                        <input type="password" name="password_confirm" required class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition-all text-left shadow-sm" dir="ltr">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full py-4 bg-primary-600 text-white font-bold rounded-2xl hover:bg-primary-700 transition-all shadow-xl shadow-primary-100 transform hover:scale-[1.01]">
                        إنشاء الحساب والبدء
                    </button>
                    <p class="mt-6 text-center text-sm text-gray-500 font-medium">
                        لديك حساب بالفعل؟ <a href="{% url 'accounts:login' %}" class="text-primary-600 font-bold hover:underline">تسجيل الدخول</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
