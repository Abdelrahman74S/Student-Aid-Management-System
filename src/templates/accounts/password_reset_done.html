{% extends "base.html" %}

{% block title %}تم إرسال الرابط | جامعة طنطا{% endblock %}

{% block content %}
<div class="flex flex-col justify-center py-12 fade-in text-right font-cairo" dir="rtl">
    <div class="max-w-md w-full mx-auto bg-white rounded-[3rem] shadow-2xl p-12 border border-gray-50 text-center">
        <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-blue-50 mb-8 border-4 border-white shadow-inner animate-pulse">
            <svg class="h-12 w-12 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 font-tajawal mb-4 text-center">تفقد بريدك الآن</h2>
        <p class="text-gray-600 mb-10 leading-relaxed text-center px-2">
            لقد أرسلنا تعليمات تعيين كلمة المرور إلى بريدك الإلكتروني. يرجى مراجعة صندوق الوارد أو مجلد الرسائل المزعجة (Spam).
        </p>
        <a href="{% url 'accounts:login' %}" class="block w-full py-4 px-6 bg-primary-600 text-white rounded-2xl font-bold hover:bg-primary-700 transition-all shadow-lg shadow-primary-100 hover:shadow-2xl">
            العودة لصفحة الدخول
        </a>
    </div>
</div>
{% endblock %}
