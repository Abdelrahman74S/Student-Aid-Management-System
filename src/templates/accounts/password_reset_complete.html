{% extends 'base.html' %}

{% block title %}تم تغيير كلمة المرور | جامعة طنطا{% endblock %}

{% block content %}
<div class="flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in text-right font-cairo">
    <div class="sm:mx-auto sm:w-full sm:max-w-md px-4">
        <div class="bg-white py-10 px-8 shadow-2xl sm:rounded-[2.5rem] border border-gray-100 text-center">
            
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-50 mb-6">
                <svg class="h-8 w-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>

            <h2 class="text-2xl font-bold text-gray-900 font-tajawal text-center mb-4">تم تغيير كلمة المرور</h2>
            
            <p class="text-gray-600 text-center text-sm mb-8 leading-relaxed">
                تم تحديث كلمة المرور الخاصة بك بنجاح. يمكنك الآن استخدام كلمة المرور الجديدة لتسجيل الدخول إلى حسابك.
            </p>

            <a href="{% url 'accounts:login' %}" 
               class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-2xl shadow-xl text-base font-bold text-white bg-primary-600 hover:bg-primary-700 transition-all duration-300 transform hover:scale-[1.01]">
                العودة لصفحة تسجيل الدخول
            </a>
            
            <div class="mt-8 text-center pt-4">
                <a href="{% url 'accounts:login' %}" class="text-sm font-bold text-primary-600 hover:text-primary-700 transition-colors">
                     تسجيل الدخول ←
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
