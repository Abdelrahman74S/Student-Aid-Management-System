{% extends "base.html" %}

{% block title %}تسجيل الدخول | جامعة طنطا{% endblock %}

{% block content %}
<div class="flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in text-right font-cairo">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center mb-8">
        <div class="mx-auto w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-lg mb-6 font-tajawal">ط</div>
        <h2 class="text-3xl font-bold text-gray-900 font-tajawal text-center">نظام المساعدات الطلابية</h2>
        <p class="mt-2 text-gray-600 text-sm">كلية العلوم - جامعة طنطا</p>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md px-4">
        <div class="bg-white py-10 px-8 shadow-2xl sm:rounded-[2.5rem] border border-gray-100">
            <form method="POST" action="{% url 'accounts:login' %}" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 mr-1">البريد الإلكتروني الجامعي</label>
                    <input type="email" name="username" required placeholder="UG_xxxxxxx@science.tanta.edu.eg"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all text-left bg-gray-50 shadow-sm" dir="ltr">
                </div>

                <div>
                    <div class="flex justify-between mb-2 px-1">
                        <label class="text-sm font-bold text-gray-700">كلمة المرور</label>
                        <a href="{% url 'accounts:password_reset' %}" class="text-xs font-bold text-primary-600 hover:text-primary-700">نسيت كلمة المرور؟</a>
                    </div>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all text-left bg-gray-50 shadow-sm" dir="ltr">
                </div>

                <button type="submit" class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-xl text-base font-bold text-white bg-primary-600 hover:bg-primary-700 transition-all duration-300 transform hover:scale-[1.01]">
                    دخول للنظام
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-50 text-center">
                <p class="text-sm text-gray-500">ليس لديك حساب؟ <a href="{% url 'accounts:register' %}" class="text-primary-600 font-bold hover:text-primary-700">أنشئ حساب طالب جديد</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
