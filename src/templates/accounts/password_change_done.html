{% extends 'base.html' %}

{% block title %}تم تحديث كلمة المرور | جامعة طنطا{% endblock %}

{% block content %}
<div class="flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in text-right font-cairo">
    <div class="sm:mx-auto sm:w-full sm:max-w-md px-4">
        <div class="bg-white py-10 px-8 shadow-2xl sm:rounded-[2.5rem] border border-gray-100 text-center">
            
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-primary-50 mb-6">
                <svg class="h-8 w-8 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>

            <h2 class="text-2xl font-bold text-gray-900 font-tajawal text-center mb-4">تم التحديث بنجاح</h2>
            
            <p class="text-gray-600 text-center text-sm mb-8 leading-relaxed">
                تم تغيير كلمة المرور الخاصة بحسابك بنجاح. يمكنك الآن العودة لمتابعة خدماتك التعليمية.
            </p>

            <a href="{% url 'accounts:dashboard' %}" 
               class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-2xl shadow-xl text-base font-bold text-white bg-primary-600 hover:bg-primary-700 transition-all duration-300 transform hover:scale-[1.01]">
                العودة للوحة التحكم
            </a>
        </div>
    </div>
</div>
{% endblock %}
