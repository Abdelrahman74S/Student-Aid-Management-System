{% load i18n %}

<div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8 font-cairo" dir="rtl">
    <form method="get" class="flex flex-wrap gap-4 items-end">
        
        <!-- Search Field -->
        <div class="flex-1 min-w-[200px]">
            <label for="q" class="block text-xs font-bold text-gray-400 mb-2">{% trans "بحث" %}</label>
            <div class="relative">
                <input type="text" name="q" id="q" value="{{ current_search }}" 
                       placeholder="{% trans 'ابحث برقم الطلب أو الاسم...' %}"
                       class="w-full pl-10 pr-4 py-2 bg-gray-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-primary-500">
                <div class="absolute left-3 top-2.5 text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>

        <!-- Filter Fields (from FilterSet) -->
        {% if filterset %}
            {% for field in filterset.form %}
                <div class="min-w-[150px]">
                    <label for="{{ field.id_for_label }}" class="block text-xs font-bold text-gray-400 mb-2">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Sort Field -->
        <div class="min-w-[150px]">
            <label for="sort" class="block text-xs font-bold text-gray-400 mb-2">{% trans "ترتيب حسب" %}</label>
            <select name="sort" id="sort" class="w-full px-4 py-2 bg-gray-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-primary-500">
                <option value="-created_at" {% if current_sort == '-created_at' %}selected{% endif %}>{% trans "الأحدث أولاً" %}</option>
                <option value="created_at" {% if current_sort == 'created_at' %}selected{% endif %}>{% trans "الأقدم أولاً" %}</option>
                {% if ordering_fields %}
                    {% for field in ordering_fields %}
                         <!-- Add custom sort options here if needed -->
                    {% endfor %}
                {% endif %}
            </select>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2">
            <button type="submit" class="bg-primary-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-primary-700 transition-all">
                {% trans "تطبيق" %}
            </button>
            <a href="{{ request.path }}" class="bg-gray-100 text-gray-600 px-4 py-2.5 rounded-xl font-bold text-sm hover:bg-gray-200 transition-all">
                {% trans "إعادة تعيين" %}
            </a>
        </div>
    </form>
</div>

<style>
    /* Styling for django-filter generated fields */
    .bg-white select, .bg-white input[type="text"], .bg-white input[type="date"] {
        @apply w-full px-4 py-2 bg-gray-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-primary-500;
    }
</style>
