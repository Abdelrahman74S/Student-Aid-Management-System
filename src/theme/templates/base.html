<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام إدارة الطلاب{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">    
    
    <!-- HTMX -->
    <script src="{% static 'JS/htmx.min.js' %}"></script>    
    
    <!-- Google Fonts: Cairo for Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="{% url 'accounts:dashboard_redirect' %}" class="text-white text-xl font-bold">
                        نظام إدارة الطلاب
                    </a>
                </div>
                
                {% if user.is_authenticated %}
                <div class="flex items-center space-x-4 space-x-reverse">
                    <span class="text-indigo-200">{{ user.full_name }}</span>
                    <a href="{% url 'accounts:logout' %}" 
                       class="bg-indigo-700 hover:bg-indigo-800 text-white px-4 py-2 rounded-lg transition duration-200">
                        خروج
                    </a>
                </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-5 left-5 z-50 space-y-2"></div>

    {% block extra_js %}{% endblock %}
    
    <script>
        // HTMX Event Listeners for Toast Notifications
        document.body.addEventListener('profileUpdated', function(evt) {
            showToast('تم الحفظ بنجاح', 'success');
        });
        
        document.body.addEventListener('profileSaved', function(evt) {
            showToast('تم تحديث البيانات', 'success');
        });
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            toast.className = `${colors} text-white px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.textContent = message;
            
            document.getElementById('toast-container').appendChild(toast);
            
            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 100);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
